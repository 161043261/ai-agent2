spring:
  application:
    name: ai-agent
  profiles:
    active: local
  # PgVector
  #  datasource:
  #    url: xxx
  #    username: root
  #    password: pass
  ai:
    dashscope:
      api-key: https://bailian.console.aliyun.com/cn-beijing/?tab=model#/api-key
      chat:
        options:
          model: qwen-plus
    ollama:
      base-url: http://localhost:11434
      chat:
        model: gemma3:1b
    # mcp:
    #   client:
    #     sse:
    #       connections:
    #         server1:
    #           url: http://localhost:8124
    #     stdio:
    #       servers-configuration: classpath:mcp-servers.json
# PgVector
